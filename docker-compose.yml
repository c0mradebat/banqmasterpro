services:
  db:
    image: postgres:16-alpine
    container_name: banqmaster-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: banqmaster
      POSTGRES_PASSWORD: banqmaster
      POSTGRES_DB: banqmaster
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U banqmaster -d banqmaster"]
      interval: 5s
      timeout: 5s
      retries: 5

  adminer:
    image: adminer:latest
    container_name: banqmaster-adminer
    restart: unless-stopped
    ports:
      - "8080:8080"
    depends_on:
      - db

volumes:
  postgres-data:
